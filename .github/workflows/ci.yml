name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: pacta
          POSTGRES_PASSWORD: pacta_test
          POSTGRES_DB: pacta
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pacta -d pacta"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CI: "true"
      DATABASE_URL: postgresql://pacta:pacta_test@127.0.0.1:5432/pacta
      DIRECT_URL: postgresql://pacta:pacta_test@127.0.0.1:5432/pacta
      TEST_DATABASE_URL: postgresql://pacta:pacta_test@127.0.0.1:5432/pacta
      NEXT_TELEMETRY_DISABLED: "1"
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm config:check
      - run: pnpm db:migrate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
